name: Bug Report
description: Report a bug in Plovr
labels: ["bug"]
body:
  - type: dropdown
    id: sub-project
    attributes:
      label: Sub-project
      description: Which sub-project(s) are affected?
      multiple: true
      options:
        - App
        - Server
        - Extension
    validations:
      required: true

  - type: dropdown
    id: integration
    attributes:
      label: Integration
      description: Which integration is involved (if any)?
      multiple: false
      options:
        - N/A
        - Square
        - Toast
        - Peppr
        - Google Business
        - Delivery
    validations:
      required: false

  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Which platform(s) are affected?
      multiple: true
      options:
        - iOS
        - Android
        - Web (Chrome)
        - Web (Safari)
        - Web (Firefox)
        - Chrome Extension
    validations:
      required: false

  - type: textarea
    id: logs-screenshots
    attributes:
      label: Logs / Screenshots
      description: Any relevant logs or screenshots.
    validations:
      required: false
